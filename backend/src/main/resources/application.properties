# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Railway PostgreSQL)
# Railway provides DATABASE_URL, but Spring R2DBC needs a specific format or individual properties
spring.r2dbc.url=r2dbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.r2dbc.username=${PGUSER}
spring.r2dbc.password=${PGPASSWORD}
# Flyway or R2DBC initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Google OAuth2 Client Configuration
# For mobile app token exchange, we only need the client ID to verify the token
# Se recomienda pasar una lista separada por comas: ID_WEB,ID_ANDROID
google.client.ids=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
# JWT Configuration for Mobile App
jwt.secret=${JWT_SECRET:BioSenseIoT_Clave_Temporal_Pruebas_12345}
jwt.expiration=86400000

# Security Logging
logging.level.org.springframework.security=DEBUG
